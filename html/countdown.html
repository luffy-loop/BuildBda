<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Shivani</title>

    <link rel="stylesheet" href="../css/countdown.css">

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<section class="final-section">

    <img
        src="../images/usbothgreenpurple.jpg"
        alt="Us"
        class="final-photo"
    >

   <div class="polaroid-wall">

    <div class="polaroid p1">
        <img src="../images/charminar.jpg" alt="">
        <span>charminar.</span>
    </div>

    <div class="polaroid p2">
        <img src="../images/selfierestaurant.webp" alt="">
        <span>chatpata.</span>
    </div>

    <div class="polaroid p3">
        <img src="../images/hersinglecap.jpg" alt="">
        <span>engineer.</span>
    </div>

    <div class="polaroid p4">
        <img src="../images/hersingleflower.jpg" alt="">
        <span>shivani.</span>
    </div>

    <div class="polaroid p5">
        <img src="../images/hersinglebeach.jpg" alt="">
        <span>peace.</span>
    </div>

    <div class="polaroid p6">
        <img src="../images/hersinglesilly.jpg" alt="">
        <span>chaos.</span>
    </div>

    <div class="polaroid p7">
        <img src="../images/hersinglebridge.jpg" alt="">
        <span>adventures.</span>
    </div>

    <div class="polaroid p8">
        <img src="../images/greenpurple.jpg" alt="">
        <span>birthday.</span>
    </div>

</div>

    <div id="countdown">

        <div class="time-box">
            <span id="days">0</span>
            <small>Days</small>
        </div>

        <div class="time-box">
            <span id="hours">0</span>
            <small>Hours</small>
        </div>

        <div class="time-box">
            <span id="minutes">0</span>
            <small>Minutes</small>
        </div>

        <div class="time-box">
            <span id="seconds">0</span>
            <small>Seconds</small>
        </div>

    </div>

    <p class="ending">
        You survived 19 years.
        Let's see what damage 20 does.
    </p>

<div class="memory-trail">
    ✦ ♡ ✦ ♡ ✦ ♡ ✦
</div>
</section>

<script src="../js/countdown.js"></script>

</body>
</html>
