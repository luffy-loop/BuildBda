<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>07/07/2007</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/login.css">
</head>

<body>
<div class="background"></div>
<div class="overlay"></div>

<div class="login-card">

    <h1>
        Some memories should only be opened
        by the people who lived them.
    </h1>

    <p class="subtitle">
        Enter the code.
    </p>

    <input
        type="password"
        id="password"
        maxlength="6"
        placeholder="______">

    <button onclick="checkPassword()">
        Unlock
    </button>

    <p id="error"></p>

</div>

<div class="footer-note">
    P.S. Some things change. Some memories don't.
</div>

<script src="js/login.js"></script></body>
</html>
